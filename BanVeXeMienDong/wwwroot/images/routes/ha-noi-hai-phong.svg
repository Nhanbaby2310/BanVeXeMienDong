<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="busGradPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9966FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7744DD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="windowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="400" height="250" fill="#E8F4F8"/>

  <!-- Ground -->
  <rect y="160" width="400" height="90" fill="#4a4a4a"/>
  <line x1="0" y1="160" x2="400" y2="160" stroke="#666" stroke-width="2"/>

  <!-- Bus body -->
  <rect x="30" y="100" width="340" height="70" fill="url(#busGradPurple)" rx="8"/>

  <!-- Bus cabin -->
  <rect x="30" y="85" width="70" height="20" fill="#663399" rx="6"/>

  <!-- Windshield -->
  <polygon points="40,85 100,85 105,75 35,75" fill="url(#windowGrad)" opacity="0.85"/>

  <!-- Side windows -->
  <rect x="110" y="105" width="20" height="28" fill="url(#windowGrad)" rx="2" opacity="0.85"/>
  <rect x="140" y="105" width="20" height="28" fill="url(#windowGrad)" rx="2" opacity="0.85"/>
  <rect x="170" y="105" width="20" height="28" fill="url(#windowGrad)" rx="2" opacity="0.85"/>
  <rect x="200" y="105" width="20" height="28" fill="url(#windowGrad)" rx="2" opacity="0.85"/>
  <rect x="230" y="105" width="20" height="28" fill="url(#windowGrad)" rx="2" opacity="0.85"/>
  <rect x="260" y="105" width="20" height="28" fill="url(#windowGrad)" rx="2" opacity="0.85"/>
  <rect x="290" y="105" width="20" height="28" fill="url(#windowGrad)" rx="2" opacity="0.85"/>
  <rect x="320" y="105" width="20" height="28" fill="url(#windowGrad)" rx="2" opacity="0.85"/>

  <!-- Door -->
  <rect x="340" y="105" width="18" height="50" fill="#552288" rx="2"/>

  <!-- Headlights -->
  <circle cx="40" cy="120" r="4" fill="#FFD700"/>
  <circle cx="55" cy="120" r="4" fill="#FFD700"/>

  <!-- Fog lights -->
  <circle cx="40" cy="135" r="2.5" fill="#FFA500"/>
  <circle cx="55" cy="135" r="2.5" fill="#FFA500"/>

  <!-- Wheels -->
  <circle cx="65" cy="172" r="12" fill="#333"/>
  <circle cx="65" cy="172" r="8" fill="#666" opacity="0.6"/>

  <circle cx="330" cy="172" r="12" fill="#333"/>
  <circle cx="330" cy="172" r="8" fill="#666" opacity="0.6"/>

  <!-- Brake lights -->
  <circle cx="360" cy="110" r="3" fill="#CC0000" opacity="0.9"/>
  <circle cx="360" cy="120" r="3" fill="#CC0000" opacity="0.9"/>

  <!-- Stripe -->
  <rect x="30" y="98" width="340" height="2" fill="#FFD700" opacity="0.7"/>

  <!-- Text -->
  <rect x="0" y="0" width="400" height="250" fill="#000" opacity="0.25"/>
  <text x="200" y="130" font-size="20" font-weight="bold" text-anchor="middle" fill="#FFF">Hà Nội - Hải Phòng</text>
</svg>
