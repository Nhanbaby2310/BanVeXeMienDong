<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky gradient background -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cityGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7931E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="300" height="200" fill="url(#skyGradient)"/>

  <!-- Sun -->
  <circle cx="250" cy="30" r="25" fill="#FFD700" opacity="0.8"/>

  <!-- Buildings - Saigon Skyline -->
  <rect x="20" y="100" width="35" height="100" fill="#2C3E50"/>
  <rect x="60" y="80" width="40" height="120" fill="#34495E"/>
  <rect x="105" y="90" width="38" height="110" fill="#2C3E50"/>
  <rect x="148" y="70" width="45" height="130" fill="#34495E"/>
  <rect x="198" y="85" width="40" height="115" fill="#2C3E50"/>
  <rect x="243" y="95" width="37" height="105" fill="#34495E"/>

  <!-- Windows -->
  <g fill="#FFD700" opacity="0.6">
    <rect x="25" y="110" width="6" height="6"/><rect x="35" y="110" width="6" height="6"/>
    <rect x="25" y="125" width="6" height="6"/><rect x="35" y="125" width="6" height="6"/>
    <rect x="25" y="140" width="6" height="6"/><rect x="35" y="140" width="6" height="6"/>
    <rect x="25" y="155" width="6" height="6"/><rect x="35" y="155" width="6" height="6"/>
    <rect x="25" y="170" width="6" height="6"/><rect x="35" y="170" width="6" height="6"/>
  </g>

  <!-- City name overlay -->
  <rect x="0" y="160" width="300" height="40" fill="rgba(0,0,0,0.4)"/>
  <text x="150" y="185" font-size="20" font-weight="bold" text-anchor="middle" fill="white">Sài Gòn</text>
</svg>